<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Red swoosh — back portion (drawn before circle so it appears behind) -->
  <path d="M 6,68 C 15,88 38,96 58,86 C 68,81 76,74 80,68"
    fill="none" stroke="#d42020" stroke-width="5" stroke-linecap="round"/>
  <path d="M 10,58 C 18,78 40,86 60,76 C 70,71 78,64 82,58"
    fill="none" stroke="#d42020" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Blue filled circle -->
  <circle cx="46" cy="47" r="38" fill="#1b3070"/>

  <!-- White 3D isometric cube -->
  <!-- Top face -->
  <polygon points="28,37 46,27 64,37 46,47" fill="white"/>
  <!-- Left face -->
  <polygon points="28,37 28,59 46,69 46,47" fill="#dde3f5"/>
  <!-- Right face -->
  <polygon points="64,37 64,59 46,69 46,47" fill="#b8c5e0"/>
  <!-- Edge lines -->
  <polyline points="28,37 46,47 64,37" fill="none" stroke="#1b3070" stroke-width="0.8" opacity="0.4"/>
  <line x1="46" y1="47" x2="46" y2="69" stroke="#1b3070" stroke-width="0.8" opacity="0.4"/>

  <!-- Red swoosh — front portion extending upper-right with double arrows -->
  <path d="M 80,68 C 90,56 96,40 93,22"
    fill="none" stroke="#d42020" stroke-width="5" stroke-linecap="round"/>
  <path d="M 82,58 C 93,46 99,30 96,12"
    fill="none" stroke="#d42020" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Arrow head 1 -->
  <polygon points="93,22 84,32 98,34" fill="#d42020"/>
  <!-- Arrow head 2 -->
  <polygon points="96,12 87,22 101,24" fill="#d42020"/>

</svg>
